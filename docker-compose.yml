version: '3.8'

# ══════════════════════════════════════════
# JD Social — Docker Compose
# চালান: docker-compose up -d
# ══════════════════════════════════════════

services:

  # ── Node.js App ──
  app:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: jd-social-app
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=jdsocial_db
      - DB_USER=jdsocial_user
      - DB_PASSWORD=jdsocial_pass
      - DB_SSL=false
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=dev-secret-key-change-in-production
      - CLIENT_URL=http://localhost:3000
      - CREATOR_REVENUE_SHARE=0.90
      - CPM_RATE=1.20
      - MIN_WITHDRAWAL=100
    volumes:
      - ./server:/app
      - /app/node_modules
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - jd-network

  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: jd-postgres
    environment:
      POSTGRES_DB: jdsocial_db
      POSTGRES_USER: jdsocial_user
      POSTGRES_PASSWORD: jdsocial_pass
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jdsocial_user -d jdsocial_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - jd-network

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: jd-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - jd-network

  # ── Nginx ──
  nginx:
    image: nginx:alpine
    container_name: jd-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/jdsocial.conf:/etc/nginx/conf.d/default.conf
      - ./client:/var/www/html
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - jd-network

  # ── pgAdmin (DB GUI) ──
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: jd-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@jdsocial.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "8080:80"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - jd-network
    profiles:
      - dev

volumes:
  postgres_data:
  redis_data:
  uploads:
  certbot_conf:
  certbot_www:

networks:
  jd-network:
    driver: bridge
